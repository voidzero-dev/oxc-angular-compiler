packages:
  - 'napi/angular-compiler'
  - 'napi/playground'
  - 'napi/angular-compiler/e2e/app'
  - 'napi/angular-compiler/e2e/compare'
  - 'napi/angular-compiler/benchmarks/*'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  protobufjs: true

minimumReleaseAgeExclude:
  - '@napi-rs/*'
  - '@oxc-node/*'
  - '@oxc-minify/*'
  - '@oxc-parser/*'
  - '@oxc-project/*'
  - '@oxc-resolver/*'
  - '@oxc-transform/*'
  - '@oxfmt/*'
  - '@oxlint-tsgolint/*'
  - '@oxlint/*'
  - '@rolldown/*'
  - '@tsdown/*'
  - '@types/*'
  - '@vitejs/*'
  - '@vitest/*'
  - '@voidzero-dev/*'
  - oxc-minify
  - oxc-parser
  - oxc-transform
  - oxfmt
  - oxlint
  - oxlint-tsgolint

catalog:
  '@napi-rs/cli': 3.7.2
  '@oxc-node/cli': 0.1.0
  '@oxc-node/core': 0.1.0
  '@tailwindcss/vite': 4.3.2
  '@types/node': 24.1.0
  tsdown: 0.22.3
  typescript: 6.0.3
  vitest: 4.1.9
  oxfmt: 0.58.0
  vite: 8.1.3
  rxjs: 7.8.2
  tslib: 2.8.1
  tailwindcss: 4.3.2

verifyDepsBeforeRun: install
