name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

env:
  DEBUG: 'napi:*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build - ${{ matrix.target }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Support longpaths
        if: ${{ matrix.os == 'windows-latest' }}
        run: git config --system core.longpaths true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Print rustup toolchain version
        shell: bash
        id: rustup-version
        run: |
          export RUST_TOOLCHAIN_VERSION="$(grep 'channel' rust-toolchain.toml | head -1 | awk -F '"' '{print $2}')"
          echo "Rust toolchain version: $RUST_TOOLCHAIN_VERSION"
          echo "RUST_TOOLCHAIN_VERSION=$RUST_TOOLCHAIN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '${{ steps.rustup-version.outputs.RUST_TOOLCHAIN_VERSION }}'
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        if: ${{ contains(matrix.target, 'musl') }}
        with:
          version: 0.15.2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@f916cfac5d8efd040e250d0cd6b967616504b3a4 # v2.68.32
        if: ${{ contains(matrix.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build ${{ matrix.target }}
        working-directory: napi/angular-compiler
        if: ${{ !contains(matrix.target , 'gnu') && !contains(matrix.target, 'musl') }}
        run: pnpm build-dev --release --target ${{ matrix.target }}

      - name: Build ${{ matrix.target }}
        working-directory: napi/angular-compiler
        if: ${{ contains(matrix.target , 'gnu') }}
        run: pnpm build-dev --release --target ${{ matrix.target }} --use-napi-cross
        env:
          TARGET_CC: clang

      - name: Build ${{ matrix.target }}
        working-directory: napi/angular-compiler
        if: ${{ contains(matrix.target, 'musl') }}
        run: pnpm build-dev --release --target ${{ matrix.target }} -x

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: bindings-${{ matrix.target }}
          path: napi/angular-compiler/*.node
          if-no-files-found: error

  publish:
    name: Publish
    permissions:
      contents: write
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: napi/angular-compiler/artifacts

      - name: Create npm dirs
        run: pnpm --filter ./napi/angular-compiler exec napi create-npm-dirs

      - name: Move artifacts
        run: pnpm --filter ./napi/angular-compiler artifacts

      - name: Build TypeScript
        run: pnpm --filter ./napi/angular-compiler build:ts

      - name: Publish to npm
        working-directory: napi/angular-compiler
        run: |
          npm install -g npm
          npm publish --access public
