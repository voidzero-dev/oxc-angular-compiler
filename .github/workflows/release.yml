name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

env:
  DEBUG: 'napi:*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-build.yml

  publish:
    name: Publish
    permissions:
      contents: write
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Install pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: napi/angular-compiler/artifacts

      - name: Create npm dirs
        run: pnpm --filter ./napi/angular-compiler exec napi create-npm-dirs

      - name: Move artifacts
        run: pnpm --filter ./napi/angular-compiler artifacts

      - name: Build TypeScript
        run: pnpm --filter ./napi/angular-compiler build:ts

      - name: Publish to npm
        working-directory: napi/angular-compiler
        run: |
          npm install -g npm
          npm publish --access public
